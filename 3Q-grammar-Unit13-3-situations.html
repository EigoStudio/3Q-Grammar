<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英検3級 文法 13章 比較 Part 3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1e88e5;
            --accent-orange: #ff9800;
            --accent-yellow: #fdd835;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --gray-border: #cfd8dc;
            --gray-light: #f5f7f8;
            --error-red: #ff5252;
            --success-green: #43a047;
        }

        * { box-sizing: border-box; font-family: "Andika", "Zen Maru Gothic", sans-serif; }

        body {
            background: linear-gradient(135deg, var(--bg-color), #e3f2fd);
            color: var(--text-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .container { max-width: 850px; width: 100%; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary-blue); font-size: 1.5rem; margin-bottom: 5px; line-height: 1.4; font-weight: 700; }
        
        .score-counter {
            font-size: 1.2rem; font-weight: bold; color: #455a64; text-align: center; margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%; height: 12px; background-color: #cbd5e1;
            border-radius: 6px; margin-bottom: 25px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 0%; background-color: var(--primary-blue);
            transition: width 0.3s ease;
        }

        .card {
            background: var(--card-bg); border-radius: 25px; padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 2px solid #fff;
            text-align: center; display: none; animation: fadeIn 0.4s ease forwards;
        }
        .card.active { display: block; }

        .situation-display {
            font-size: 1.35rem; font-weight: bold; color: var(--text-color);
            background: var(--gray-light); padding: 20px; border-radius: 15px;
            margin-bottom: 25px; text-align: left; line-height: 1.6;
            border-left: 5px solid var(--accent-orange);
            border-top: 1px solid var(--gray-border); border-right: 1px solid var(--gray-border); border-bottom: 1px solid var(--gray-border);
        }

        .q-title {
            font-size: 1rem; background-color: #e2e8f0; padding: 6px 15px;
            border-radius: 10px; display: inline-block; margin-bottom: 15px; font-weight: bold; color: #455a64;
        }

        .question-text {
            font-size: 1.5rem; font-weight: bold; color: var(--primary-blue);
            text-align: center; line-height: 1.6; margin-bottom: 25px;
            background: #e3f2fd; padding: 15px; border-radius: 15px;
            border: 2px dashed var(--primary-blue);
        }

        .input-area {
            margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; align-items: center;
        }

        .answer-input {
            font-size: 1.4rem; font-weight: bold; padding: 10px 20px;
            border: 3px solid var(--gray-border); border-radius: 15px;
            width: 300px; text-align: center; color: var(--text-color);
            transition: all 0.2s;
        }
        .answer-input:focus {
            outline: none; border-color: var(--accent-orange); background-color: #fffde7;
        }

        .answer-input.correct {
            background-color: #e8f5e9 !important; border-color: var(--success-green) !important;
            color: var(--success-green) !important;
        }
        .answer-input.wrong {
            background-color: #ffebee !important; border-color: var(--error-red) !important;
            color: var(--error-red) !important;
        }

        .action-btn {
            padding: 15px 40px; font-weight: bold; font-size: 1.2rem;
            border: none; border-radius: 50px; cursor: pointer; color: white;
            width: 100%; margin-top: 15px; transition: 0.1s;
        }
        .check-btn { background: var(--success-green); box-shadow: 0 5px 0 #2e7d32; }
        .next-btn { background: var(--accent-orange); box-shadow: 0 5px 0 #e65100; display: none; }
        .report-btn { background: #0288d1; box-shadow: 0 5px 0 #01579b; display: inline-block; }
        .action-btn:active { transform: translateY(3px); box-shadow: none; }

        .mistake-list { text-align: left; background: #fafafa; padding: 15px; border-radius: 10px; margin: 20px 0; border: 1px solid #cfd8dc; }
        .mistake-item { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 1rem; line-height: 1.4; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #excellentPopup {
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background-color: var(--accent-yellow); color: #3e2723; padding: 12px 40px; border-radius: 50px;
            font-weight: bold; font-size: 1.6rem; box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.27); z-index: 1000;
        }
        #excellentPopup.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 600px) {
            .input-area { flex-direction: column; }
            .answer-input { width: 100%; }
        }
    </style>
</head>
<body>

<div id="excellentPopup">Excellent! 🌟</div>

<div class="container">
    <header>
        <h1>英検3級 文法 13章 比較 Part 3 📖</h1>
    </header>

    <div class="score-counter">Score: <span id="currentScore">0</span> / 12</div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div id="quiz-container"></div>

    <div class="card" id="card-result">
        <h2 style="color: var(--primary-blue); margin-bottom: 10px;">Training Complete! 🎉</h2>
        <p style="font-weight: bold; color: #2c3e50; margin-bottom: 15px;">
            Your Score: <span style="font-size: 2rem; color: var(--primary-blue);" id="finalScore">0</span> / 12
        </p>
        <div id="mistake-container" style="display:none;">
            <p style="color: var(--error-red); font-weight: bold; text-align: left; margin-bottom: 5px;">Review List:</p>
            <div class="mistake-list" id="mistake-list"></div>
        </div>
        <button class="action-btn report-btn" onclick="sendEmail()">Report to Tamaki-sensei 📨</button>
        <button class="action-btn next-btn" style="display:inline-block; background-color: #78909c; box-shadow: 0 5px 0 #546e7a; margin-top: 10px;" onclick="location.reload()">Try Again 🔄</button>
    </div>
</div>

<script>
    // 3つのシチュエーション、各4問の合計12問
    const quizData = [
        // --- Situation 1 ---
        {
            title: "Situation 1 (1/4)",
            situation: "Two years ago, Mika was taller than Ken, but not as tall as Taro. Now, Ken is the tallest of the three. Mika is shorter than Ken, but not as short as Taro.",
            question: "Two years ago, who was the tallest of the three?<br>→ ( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ) was.",
            ans: ["Taro"]
        },
        {
            title: "Situation 1 (2/4)",
            situation: "Two years ago, Mika was taller than Ken, but not as tall as Taro. Now, Ken is the tallest of the three. Mika is shorter than Ken, but not as short as Taro.",
            question: "Two years ago, Mika was ( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ) than Ken.",
            ans: ["taller"]
        },
        {
            title: "Situation 1 (3/4)",
            situation: "Two years ago, Mika was taller than Ken, but not as tall as Taro. Now, Ken is the tallest of the three. Mika is shorter than Ken, but not as short as Taro.",
            question: "Now, who is the shortest of the three?<br>→ ( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ) is.",
            ans: ["Taro"]
        },
        {
            title: "Situation 1 (4/4)",
            situation: "Two years ago, Mika was taller than Ken, but not as tall as Taro. Now, Ken is the tallest of the three. Mika is shorter than Ken, but not as short as Taro.",
            question: "Now, Mika is shorter than ( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ).",
            ans: ["Ken"]
        },

        // --- Situation 2 (many/fewer/most/many) ---
        {
            title: "Situation 2 (1/4)",
            situation: "Emma loves reading. She has many books. She has more books than Yuki, but not as many as Kota. Kota has thirty books! Yuki has fewer books than Emma. Kota has the most books of all.",
            question: "Who has the most books?<br>→ ( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ) does.",
            ans: ["Kota"]
        },
        {
            title: "Situation 2 (2/4)",
            situation: "Emma loves reading. She has many books. She has more books than Yuki, but not as many as Kota. Kota has thirty books! Yuki has fewer books than Emma. Kota has the most books of all.",
            question: "Emma has ( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ) books than Yuki.",
            ans: ["more"]
        },
        {
            title: "Situation 2 (3/4)",
            situation: "Emma loves reading. She has many books. She has more books than Yuki, but not as many as Kota. Kota has thirty books! Yuki has fewer books than Emma. Kota has the most books of all.",
            question: "Does Yuki have more books than Emma?<br>→ No, Yuki has ( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ) books than Emma.",
            ans: ["fewer", "less"]
        },
        {
            title: "Situation 2 (4/4)",
            situation: "Emma loves reading. She has many books. She has more books than Yuki, but not as many as Kota. Kota has thirty books! Yuki has fewer books than Emma. Kota has the most books of all.",
            question: "Emma doesn't have as ( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ) books as Kota.",
            ans: ["many"]
        },

        // --- Situation 3 (well/better/best) ---
        {
            title: "Situation 3 (1/4)",
            situation: "Takuya, Ren, and Daiki practice tennis hard. Takuya plays tennis well. Ren plays tennis better than Takuya. Daiki plays tennis the best of the three. Takuya is a good player, but Daiki is the best player in their club.",
            question: "Who plays tennis the best?<br>→ ( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ) does.",
            ans: ["Daiki"]
        },
        {
            title: "Situation 3 (2/4)",
            situation: "Takuya, Ren, and Daiki practice tennis hard. Takuya plays tennis well. Ren plays tennis better than Takuya. Daiki plays tennis the best of the three. Takuya is a good player, but Daiki is the best player in their club.",
            question: "Ren plays tennis ( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ) than Takuya.",
            ans: ["better"]
        },
        {
            title: "Situation 3 (3/4)",
            situation: "Takuya, Ren, and Daiki practice tennis hard. Takuya plays tennis well. Ren plays tennis better than Takuya. Daiki plays tennis the best of the three. Takuya is a good player, but Daiki is the best player in their club.",
            question: "Takuya plays tennis ( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ), but Ren is better.",
            ans: ["well", "good"]
        },
        {
            title: "Situation 3 (4/4)",
            situation: "Takuya, Ren, and Daiki practice tennis hard. Takuya plays tennis well. Ren plays tennis better than Takuya. Daiki plays tennis the best of the three. Takuya is a good player, but Daiki is the best player in their club.",
            question: "Daiki is the ( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ) player of the three.",
            ans: ["best"]
        }
    ];

    let currentIdx = 0;
    let firstTryCorrectCount = 0;
    let isFirstTry = true;
    let mistakes = [];
    const container = document.getElementById('quiz-container');

    function initApp() {
        quizData.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = `card ${idx === 0 ? 'active' : ''}`;
            card.id = `card-${idx}`;

            card.innerHTML = `
                <div class="q-title">${q.title}</div>
                <div class="situation-display"><strong>📖 Situation Story:</strong><br>${q.situation}</div>
                <div class="question-text">${q.question}</div>
                <div class="input-area">
                    <input type="text" class="answer-input" id="input-${idx}" placeholder="Type your answer here" autocomplete="off">
                </div>
                <div class="action-nav">
                    <button class="action-btn check-btn" id="check-${idx}" onclick="checkAnswer(${idx})">Check Answer ✔</button>
                    <button class="action-btn next-btn" id="next-${idx}" onclick="goNext(${idx})">Next Question ➔</button>
                </div>
            `;
            container.appendChild(card);
        });
        updateProgressBar(0);
    }

    function checkAnswer(idx) {
        const inputEl = document.getElementById(`input-${idx}`);
        const userAns = inputEl.value.trim().toLowerCase();
        const checkBtn = document.getElementById(`check-${idx}`);
        const nextBtn = document.getElementById(`next-${idx}`);
        
        if (userAns === "") {
            alert("Please type your answer!");
            return;
        }

        const allowedAnswers = quizData[idx].ans.map(a => a.toLowerCase());
        const isCorrect = allowedAnswers.includes(userAns);

        if (isCorrect) {
            inputEl.className = "answer-input correct";
            inputEl.disabled = true;
            showExcellent();
            
            if (isFirstTry) {
                firstTryCorrectCount++;
                document.getElementById('currentScore').textContent = firstTryCorrectCount;
            }

            checkBtn.style.display = 'none';
            nextBtn.style.display = 'inline-block';
        } else {
            inputEl.className = "answer-input wrong";
            if (isFirstTry) {
                mistakes.push({ q: quizData[idx].question.replace(/&nbsp;|<br>/g, " "), s: quizData[idx].title, correctAns: quizData[idx].ans[0] });
                isFirstTry = false;
            }
            alert(`Oops! Read the [Situation Story] carefully again.\nHint: The word starts with "${quizData[idx].ans[0][0]}"`);
        }
    }

    function showExcellent() {
        const popup = document.getElementById('excellentPopup');
        popup.classList.add('show');
        setTimeout(() => popup.classList.remove('show'), 1200);
    }

    function updateProgressBar(step) {
        const percentage = (step / quizData.length) * 100;
        document.getElementById('progressFill').style.width = percentage + '%';
    }

    function goNext(current) {
        document.getElementById(`card-${current}`).classList.remove('active');
        currentIdx++;
        isFirstTry = true;
        
        if (currentIdx < quizData.length) {
            document.getElementById(`card-${currentIdx}`).classList.add('active');
            updateProgressBar(currentIdx);
        } else {
            updateProgressBar(quizData.length);
            showResultScreen();
        }
    }

    function showResultScreen() {
        document.getElementById('card-result').classList.add('active');
        document.getElementById('finalScore').textContent = firstTryCorrectCount;
        
        if (mistakes.length > 0) {
            document.getElementById('mistake-container').style.display = 'block';
            const list = document.getElementById('mistake-list');
            list.innerHTML = mistakes.map(m => `
                <div class="mistake-item"><strong>[${m.s}]</strong> ${m.q} <br><span style="color:var(--success-green); font-weight:bold;">Correct Answer: ${m.correctAns}</span></div>
            `).join('');
        }
    }

    function sendEmail() {
        const teacherEmail = "tamaki@eigostudio-stepforward.com";
        const subject = encodeURIComponent("英検3級 文法 13章 比較 Part 3 Result");
        
        const cleanMistakes = mistakes.map(m => `・${m.s}: ${m.q} (Correct: ${m.correctAns})`).join("\n");
        let mistakeText = mistakes.length > 0 ? "\n\n■ Review Required:\n" + cleanMistakes : "\n\nPerfect! First-try correct on all questions!";
        
        const body = encodeURIComponent(`Dear Tamaki-sensei,\n\nI have finished the "比較 Part 3" training!\n\nResult: ${firstTryCorrectCount} / ${quizData.length} (First-try correct)${mistakeText}\n\nThank you!`);
        
        window.location.href = `mailto:${teacherEmail}?subject=${subject}&body=${body}`;
    }

    window.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
